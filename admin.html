

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css">

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    integrity="sha512-pV6HxqQzX8z1o+URQbghjHE+R5dLQK5xL5k+U9S5hPtvkFH9nxdd+6k4FfI0/HXKb6a1sw5VBC0E8BwpS+lfGA=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
</head>
<body>

<header>
  <h1>Admin Panel</h1>
</header>

<nav>
  <a href="index.html">Home</a>
</nav>

<div class="container">

  <!-- Admin Login -->
  <div id="adminContent" class="hidden">
    <h2>Total Profit: <span id="profit">0</span></h2>

    <!-- Navigation Bar for Pages -->
    <nav class="page-nav">
      <button class="nav-btn active" onclick="showPage('add-item', this)">Add Item</button>
      <button class="nav-btn" onclick="showPage('remove-item', this)">Remove Item</button>
      <button class="nav-btn" onclick="showPage('record-sale', this)">Record Sale</button>
      <button class="nav-btn" onclick="showPage('inventory', this)">Inventory Overview</button>
      <button class="nav-btn" onclick="showPage('sales-history', this)">Sales History</button>
    </nav>

    <!-- Add Item Page -->
    <div id="add-item" class="page">
      <h3>Add Item</h3>
      <label for="name">Item Name:</label>
      <input id="name" placeholder="Item Name">
      <label for="price">Selling Price:</label>
      <input id="price" type="number" placeholder="Selling Price">
      <label for="cost">Cost Price:</label>
      <input id="cost" type="number" placeholder="Cost Price">
      <label for="stock">Stock:</label>
      <input id="stock" type="number" placeholder="Stock">
      <label for="image">Item Image:</label>
      <input id="image" type="file" accept="image/*">
      <button onclick="addItem()">Add</button>
    </div>

    <!-- Remove Item Page -->
    <div id="remove-item" class="page" style="display: none;">
      <h3>Remove Item</h3>
      <label for="removeName">Item Name:</label>
      <input id="removeName" list="itemList" placeholder="Item Name">
      <button onclick="removeItem()">Remove</button>
    </div>

    <!-- Record Sale Page -->
    <div id="record-sale" class="page" style="display: none;">
      <h3>Record Sale</h3>
      <label for="saleName">Item Name:</label>
      <input id="saleName" list="itemList" placeholder="Item Name">
      <label for="saleQty">Quantity Sold:</label>
      <input id="saleQty" type="number" placeholder="Quantity Sold">
      <label for="salePrice">Selling Price per Item:</label>
      <input id="salePrice" type="number" placeholder="Selling Price">
      <label for="paymentMethod">Payment Method:</label>
      <select id="paymentMethod">
        <option value="Cash">Cash</option>
        <option value="Credit">Credit</option>
        <option value="Mpesa">Mpesa</option>
      </select>
      <label for="saleDate">Date:</label>
      <input id="saleDate" type="date">
      <label for="saleTime">Time:</label>
      <input id="saleTime" type="time">
      <button onclick="sellItem()">Sell</button>
    </div>

    <!-- Inventory Overview Page -->
    <div id="inventory" class="page" style="display: none;">
      <h3>Inventory Overview</h3>
    <div class="search-container">
      <input type="text" id="searchInput" placeholder="Search items...">
      <i class="fas fa-search"></i>
    </div>

    <!-- Inventory Table -->
    <table id="inventoryTable">
      <thead>
        <tr>
          <th>Image</th>
          <th>Name</th>
          <th>Price</th>
          <th>Cost</th>
          <th>Stock</th>
          <th>Sold</th>
          <th>Profit</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    </div>

    <!-- Sales History Page -->
    <div id="sales-history" class="page" style="display: none;">
      <h3>Sales History</h3>
      <label for="historyDate">Select Date:</label>
      <input id="historyDate" type="date">
      <button onclick="filterSales()">Filter</button>

      <table id="salesTable">
        <thead>
          <tr>
            <th>Date</th>
            <th>Time</th>
            <th>Item</th>
            <th>Quantity</th>
            <th>Price</th>
            <th>Total</th>
            <th>Payment</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

  </div>

  <datalist id="itemList"></datalist>

  <!-- Login Section -->
  <div id="loginPanel">
    <h3>Admin Login</h3>
    <div class="password-field">
      <input id="password" type="password" placeholder="Password">
      <label class="show-password">
        <input id="showPassword" type="checkbox" onchange="togglePassword()">
        Show password
      </label>
    </div>
    <button onclick="login()">Login</button>
  </div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
