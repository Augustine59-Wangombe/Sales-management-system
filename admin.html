
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-o8+Z8U1hTz3B9KU1VtY9Xy0pIjgYtvK0X5e/eB35YJv6+QnI9M+2J3N+oqvU6C2uO+0iR+R0Oqxy0Oi1+ZxY9A==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Admin Panel</h1>
</header>

<nav>
  <a href="index.html">Home</a>
  <button onclick="logout()">Logout</button>
</nav>

<div class="container">

  <!-- Admin Login -->
  <div id="adminContent" class="hidden">
    <h2>Total Profit: <span id="profit">0</span></h2>

    <!-- Add Item -->
    <div class="form-section">
      <h3>Add Item</h3>
      <label for="name">Item Name:</label><br>
      <input id="name" placeholder="Item Name"><br>
      <label for="price">Selling Price:</label><br>
      <input id="price" type="number" placeholder="Selling Price"><br>
      <label for="cost">Cost Price:</label><br>
      <input id="cost" type="number" placeholder="Cost Price"><br>
      <label for="stock">Stock:</label><br>
      <input id="stock" type="number" placeholder="Stock"><br>
      <label for="image">Item Image:</label><br>
      <input id="image" type="file" accept="image/*"><br>
      <button onclick="addItem()">Add</button>
    </div>

    <!-- Remove Item -->
    <div class="form-section">
      <h3>Remove Item</h3>
      <label for="removeName">Item Name:</label><br>
      <input id="removeName" list="itemList" placeholder="Item Name"><br>
      <button onclick="removeItem()">Remove</button>
    </div>

    <!-- Record Sale -->
    <div class="form-section">
      <h3>Record Sale</h3>
      <label for="saleName">Item Name:</label><br>
      <input id="saleName" list="itemList" placeholder="Item Name"><br>
      <label for="saleQty">Quantity Sold:</label><br>
      <input id="saleQty" type="number" placeholder="Quantity Sold"><br>
      <label for="salePrice">Selling Price per Item:</label><br>
      <input id="salePrice" type="number" placeholder="Selling Price"><br>
      <label for="paymentMethod">Payment Method:</label><br>
      <select id="paymentMethod">
        <option value="cash">Cash</option>
        <option value="credit">Credit</option>
      </select><br>
      <label for="saleDate">Date:</label><br>
      <input id="saleDate" type="date"><br>
      <label for="saleTime">Time:</label><br>
      <input id="saleTime" type="time"><br>
      <button onclick="sellItem()">Sell</button>
    </div>

    <h3>Inventory Overview</h3>
    <div class="search-container">
      <input type="text" id="searchInput" placeholder="Search items...">
      <i class="fas fa-search"></i>
    </div>

    <!-- Inventory Table -->
    <table id="inventoryTable">
      <thead>
        <tr>
          <th>Image</th>
          <th>Name</th>
          <th>Price</th>
          <th>Cost</th>
          <th>Stock</th>
          <th>Sold</th>
          <th>Profit</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <h3>Sales History</h3>
    <label for="historyDate">Select Date:</label>
    <input id="historyDate" type="date">
    <button onclick="filterSales()">Filter</button>
    <table id="salesTable">
      <thead>
        <tr>
          <th>Date</th>
          <th>Time</th>
          <th>Item</th>
          <th>Quantity</th>
          <th>Price</th>
          <th>Total</th>
          <th>Payment</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <datalist id="itemList"></datalist>

  <!-- Login Section -->
  <div id="loginPanel">
    <h3>Admin Login</h3>
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
